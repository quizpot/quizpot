services:
  app:
    build:
      context: .
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://quizpot:quizpot@db:5432/quizpot}
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules
            - .next
        - action: rebuild
          path: package.json

  db:
    image: postgres:17
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: quizpot
      POSTGRES_PASSWORD: quizpot
      POSTGRES_DB: quizpot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizpot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: