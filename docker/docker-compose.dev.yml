services:
  db:
    image: postgres:17
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: quizpot
      POSTGRES_PASSWORD: quizpot
      POSTGRES_DB: quizpot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizpot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: